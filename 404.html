<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Gartup</title>
    <link rel="icon" type="image/png" href="GartupLogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FFE900;
            --accent-hover: #f2dd00;
            --bg: #ffffff;
            --text: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #111111;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            max-width: 1100px;
            padding: 40px;
            width: 100%;
        }

        .error-image {
            width: 500px;
            max-width: 50%;
            height: auto;
            object-fit: contain;
        }

        .content {
            flex: 1;
        }

        h1 {
            font-family: 'Lexend', sans-serif;
            font-size: 100px;
            line-height: 0.9;
            margin-bottom: 10px;
            color: #111111;
            font-weight: 800;
        }

        h2 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #111111;
        }

        p {
            font-size: 18px;
            color: #555555;
            margin-bottom: 40px;
            line-height: 1.6;
            max-width: 400px;
        }

        .back-btn {
            display: inline-block;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            border: none; /* Removed the black border */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            background: var(--accent-hover);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                text-align: center;
                gap: 30px;
            }
            .error-image {
                width: 300px;
                max-width: 80%;
            }
            .content {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            h1 { font-size: 70px; }
            h2 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="error.png" alt="Error 404" class="error-image">

        <div class="content">
            <h1>404</h1>
            <h2>Lost in the world?</h2>
            <p>The page you are looking for has been moved or does not exist in our index. Let's get you back to the wiki.</p>
            <a href="https://gartup.hs.vc" class="back-btn">Back</a>
        </div>
    </div>

</body>
</html>
