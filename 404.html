<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartup | Page Not Found</title>
    
    <link rel="icon" type="image/png" href="GartupLogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lexend:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gartup-yellow: #FFE900;
            --gartup-black: #111111;
            --bg-color: #ffffff;
            --card-bg: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg-color); 
            color: var(--gartup-black); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .viewport {
            width: 100%;
            padding: 20px;
            max-width: 680px;
            text-align: center;
        }

        .error-card {
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .brand-space img { height: 50px; width: auto; margin-bottom: 20px; }

        .error-code {
            font-family: 'Lexend';
            font-size: 80px;
            color: var(--gartup-yellow);
            text-shadow: 2px 2px 0px var(--gartup-black);
            margin-bottom: 10px;
            line-height: 1;
        }

        h1 { font-family: 'Lexend'; font-size: 24px; margin-bottom: 15px; }
        p { font-size: 16px; color: #555; line-height: 1.6; margin-bottom: 30px; }

        .back-home {
            display: inline-block;
            background: var(--gartup-yellow);
            color: var(--gartup-black);
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 16px;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 233, 0, 0.3);
        }

        .back-home:active { transform: scale(0.95); }

        /* Estilo para que combine con tu buscador */
        .footer-note { margin-top: 40px; font-size: 12px; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="viewport">
        <div class="brand-space">
            <img src="GartupBanner.png" alt="Gartup">
        </div>

        <div class="error-card">
            <div class="error-code">404</div>
            <h1>Lost in space?</h1>
            <p>We couldn't find the page you're looking for. <br>Even the best explorers get lost sometimes!</p>
            
            <a href="/" class="back-home">Back to Search</a>
        </div>

        <div class="footer-note">Gartup Search Engine</div>
    </div>

</body>
</html>
