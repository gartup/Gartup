<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartup | Persons Index</title>
    <link rel="icon" type="image/png" href="GartupLogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Lexend:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FFE900;
            --bg: #ffffff;
            --text: #111111;
            --border: #f0f0f2;
            --card-bg: #ffffff;
            --verified-blue: #0095f6;
        }

        [data-theme="dark"] {
            --bg: #0a0a0b;
            --text: #f5f5f7;
            --border: #1f1f22;
            --card-bg: #161618;
        }

        * { transition: background 0.3s, color 0.3s; box-sizing: border-box; }
        
        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        header {
            width: 100%; padding: 15px 25px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 1000;
            background: var(--bg); border-bottom: 1px solid var(--border);
        }

        .logo-area { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-area img { height: 24px; }
        .logo-area span { font-family: 'Lexend'; font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }

        .search-box {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 8px 15px; border-radius: 12px; width: 100%; max-width: 350px;
            display: flex; align-items: center;
        }
        
        input { 
            border: none; background: transparent; color: var(--text); 
            outline: none; width: 100%; font-size: 14px; 
        }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        .person-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 40px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
            display: none;
        }

        .profile-img {
            width: 150px; height: 150px; border-radius: 50%;
            object-fit: cover; margin-bottom: 20px;
            border: 4px solid var(--accent);
        }

        .name-wrapper { 
            display: flex; align-items: center; justify-content: center; 
            gap: 8px; margin-bottom: 10px;
        }

        .person-name { font-family: 'Lexend'; font-size: 36px; margin: 0; }
        .verified-icon { width: 28px; height: 28px; }

        .person-bio { 
            font-size: 17px; line-height: 1.8; opacity: 0.8; 
            text-align: left; margin-top: 30px;
        }

        .tag {
            display: inline-block; padding: 5px 15px; background: var(--accent);
            color: #000; border-radius: 20px; font-size: 12px; font-weight: 800;
            text-transform: uppercase; margin-bottom: 15px;
        }

        .loader { text-align: center; padding: 100px 0; font-weight: 700; letter-spacing: 2px; opacity: 0.3; }

        @media (max-width: 600px) {
            .person-card { padding: 25px; }
            .person-name { font-size: 28px; }
            .search-box { max-width: 180px; }
        }
    </style>
</head>
<body id="body">

    <header>
        <div class="logo-area" onclick="location.reload()">
            <img src="GartupBanner.png" alt="Gartup">
            <span>Persons Index</span>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search person..." onkeypress="handleKey(event)">
        </div>
    </header>

    <div class="container">
        <div id="loader" class="loader">INDEXING PERSON...</div>

        <div id="person-card" class="person-card">
            <div id="tag-box"></div>
            <img id="p-img" class="profile-img" src="" alt="Profile">
            <div class="name-wrapper">
                <h1 id="p-name" class="person-name"></h1>
                <img id="verified-badge" src="Verificado.png" class="verified-icon" title="Verified Personal Profile" style="display:none;">
            </div>
            <div id="p-bio" class="person-bio"></div>
        </div>
    </div>

    <script>
        // Lista Maestra de Verificados (Gartup Elite)
        const topFigures = [
            "Musguito", "Einstein", "Newton", "Tesla", "Hawking", "Curie", "Darwin",
            "Steve Jobs", "Elon Musk", "Bill Gates", "Zuckerberg", "Jeff Bezos",
            "MrBeast", "PewDiePie", "Ibai", "Auronplay", "Rubius",
            "Cristiano Ronaldo", "Messi", "Nadal", "Michael Jordan", "LeBron James", "Pelé", "Maradona",
            "Michael Jackson", "Freddie Mercury", "Taylor Swift", "Beyoncé", "Shakira", "Elvis Presley",
            "Tom Cruise", "Robert Downey Jr.", "Scarlett Johansson", "Morgan Freeman", "The Rock",
            "Julius Caesar", "Napoleon", "Gandhi", "Lincoln", "Churchill", "Cleopatra",
            "Leonardo da Vinci", "Shakespeare", "Picasso", "Van Gogh"
        ];

        // Palabras clave para filtrar NO-PERSONAS
        const nonPersonKeywords = ["company", "multinational", "organization", "technology", "software", "operating system", "city", "country", "brand", "firm", "search engine", "website"];

        function handleKey(e) {
            if (e.key === 'Enter') searchPerson(e.target.value);
        }

        async function searchPerson(name) {
            const card = document.getElementById('person-card');
            const loader = document.getElementById('loader');
            const badge = document.getElementById('verified-badge');
            
            loader.style.display = "block";
            card.style.display = "none";
            badge.style.display = "none";

            const query = name.toLowerCase().trim();

            // CASO MAESTRO: MUSGUITO
            if (query === "musguito") {
                setTimeout(() => {
                    document.getElementById('p-name').innerText = "Musguito";
                    document.getElementById('p-bio').innerText = "Musguito is a recognized Minecraft content creator, known for exploring unique world seeds and sharing creative gameplay within the community.";
                    document.getElementById('p-img').src = "Musguito.png"; 
                    document.getElementById('tag-box').innerHTML = `<span class="tag">Content Creator</span>`;
                    badge.style.display = "block";
                    loader.style.display = "none";
                    card.style.display = "block";
                }, 400);
                return;
            }

            try {
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`);
                const data = await res.json();

                if (data.title === "Not found") throw new Error("not_found");

                // FILTRO DE PERSONAS: Analizar descripción
                const desc = (data.description || "").toLowerCase();
                const isNonPerson = nonPersonKeywords.some(keyword => desc.includes(keyword));

                if (isNonPerson) {
                    loader.innerText = "Only personal profiles are indexed here.";
                    return;
                }

                document.getElementById('p-name').innerText = data.title;
                document.getElementById('p-bio').innerHTML = data.extract_html || data.extract;
                document.getElementById('p-img').src = data.originalimage ? data.originalimage.source : 'https://via.placeholder.com/150';
                document.getElementById('tag-box').innerHTML = `<span class="tag">${data.description || 'Person'}</span>`;

                // Verificar si está en la lista de elite o es una página muy importante (ID bajo)
                if (topFigures.some(f => data.title.includes(f)) || data.pageid < 80000) {
                    badge.style.display = "block";
                }

                loader.style.display = "none";
                card.style.display = "block";

            } catch (err) {
                loader.innerText = "PERSON NOT FOUND IN INDEX";
            }
        }

        window.onload = () => searchPerson("Albert Einstein");
    </script>
</body>
</html>
